  /api/offline/jobs/{jobId}/histories:
    get:
      tags:
        - Offline
      summary: Histories
      description: >-
        ## İş Geçmişi Getir (Histories)


        Belirtilen offline iş kaydına ait geçmiş (history) bilgilerini getirir.
        Bu endpoint, bir işin oluşturulmasından itibaren geçirdiği yönlendirme
        geçmişini kronolojik olarak listeler.


        ### Endpoint


        `GET /api/offline/jobs/:jobId/histories`


        ### Kimlik Doğrulama


        Bu istek, üst koleksiyondan miras alınan **Bearer Token** kimlik
        doğrulamasını kullanır. Token, `{{authToken}}` ortam değişkeninden
        çözümlenir.


        ### Yol Parametreleri (Path Variables)


        | Parametre | Tip | Zorunlu | Açıklama |

        | --- | --- | --- | --- |

        | `jobId` | integer | ✅ | Geçmiş kayıtları getirilecek offline işin
        benzersiz kimliği. |


        ### Örnek İstek


        ```

        GET https://gatewayapi.insurapps.net/api/offline/jobs/24532234/histories

         ```

        ### Yanıt Yapısı


        #### Başarılı Yanıt (200 OK)


        İş kaydına ait yönlendirme geçmişi bir JSON dizisi olarak döner.


        ``` json

        [
            {
                "Message": "İş kendisine yönlendirildi.",
                "ForwardDate": "2025-01-10T11:46:05.4980981",
                "FromUserId": null,
                "ToUserId": "4c31d679-b285-4040-9b57-5ce49e9f604c",
                "AssignerUserId": "4c31d679-b285-4040-9b57-5ce49e9f604c"
            },
            {
                "Message": null,
                "ForwardDate": "2025-01-10T11:46:21.0530294",
                "FromUserId": "4c31d679-b285-4040-9b57-5ce49e9f604c",
                "ToUserId": "97aa0081-8ca5-4acb-b757-15efd1bba944",
                "AssignerUserId": "4c31d679-b285-4040-9b57-5ce49e9f604c"
            },
            {
                "Message": "İş kendisine yönlendirildi.",
                "ForwardDate": "2026-02-04T13:54:28.7929678",
                "FromUserId": "97aa0081-8ca5-4acb-b757-15efd1bba944",
                "ToUserId": "ae116cd4-a26e-47ab-8b0f-07d5ac9cb79c",
                "AssignerUserId": "ae116cd4-a26e-47ab-8b0f-07d5ac9cb79c"
            }
        ]

         ```

        **Dizi Elemanları:**


        | Alan | Tip | Açıklama |

        | --- | --- | --- |

        | `Message` | string / null | Yönlendirme ile ilgili açıklama mesajı.
        Otomatik yönlendirmelerde `null` olabilir. |

        | `ForwardDate` | string (datetime) | Yönlendirmenin gerçekleştirildiği
        tarih ve saat. |

        | `FromUserId` | string (GUID) / null | Yönlendirmeyi yapan (kaynak)
        kullanıcının kimliği. İlk atamada `null` olabilir. |

        | `ToUserId` | string (GUID) | Yönlendirmenin hedef kullanıcısının
        kimliği. |

        | `AssignerUserId` | string (GUID) | Yönlendirme işlemini gerçekleştiren
        kullanıcının kimliği. |


        #### İş Bulunamadı Hatası (404 - Status: false)


        Belirtilen `jobId` ile eşleşen bir iş kaydı bulunamadığında döner.


        ``` json

        {
            "Status": false,
            "Code": "OfflineJobs.JobNotFound",
            "Message": "No job found for the requested JobId.",
            "Response": null
        }

         ```

        | Alan | Tip | Açıklama |

        | --- | --- | --- |

        | `Status` | boolean | İşlem durumu (`false` = başarısız). |

        | `Code` | string | Hata kodu. |

        | `Message` | string | Hata mesajı. |

        | `Response` | null | Hata durumunda `null` döner. |


        #### Yetkilendirme Hataları


        | Durum Kodu | Açıklama |

        | --- | --- |

        | `401 Unauthorized` | Token geçersiz veya süresi dolmuş. Body dönmez. |

        | `403 Forbidden` | Kullanıcının bu endpoint'e erişim yetkisi yok. Body
        dönmez. |


        ### Notlar


        - İstek göndermeden önce aktif ortamda geçerli bir `authToken`
        değişkeninin ayarlandığından emin olun. Token almak için
        **Authentication Login** isteğini kullanabilirsiniz.
            
        - Token süresi dolmuşsa, yeni bir token almak için **Refresh Token**
        isteğini kullanın.
            
        - `jobId` değeri, **Jobs** endpoint'inden dönen `Id` alanına karşılık
        gelir. Önce Jobs endpoint'ini kullanarak geçerli iş kimliklerini
        listeleyebilirsiniz.
      parameters:
        - name: jobId
          in: path
          schema:
            type: integer
          required: true
          example: '24532234'
      responses:
        '200':
          description: OK
          headers:
            Content-Type:
              schema:
                type: string
                example: application/json
          content:
            application/json:
              schema:
                type: object
              example:
                - Message: İş kendisine yönlendirildi.
                  ForwardDate: '2025-01-10T11:46:05.4980981'
                  FromUserId: null
                  ToUserId: 4c31d679-b285-4040-9b57-5ce49e9f604c
                  AssignerUserId: 4c31d679-b285-4040-9b57-5ce49e9f604c
                - Message: null
                  ForwardDate: '2025-01-10T11:46:21.0530294'
                  FromUserId: 4c31d679-b285-4040-9b57-5ce49e9f604c
                  ToUserId: 97aa0081-8ca5-4acb-b757-15efd1bba944
                  AssignerUserId: 4c31d679-b285-4040-9b57-5ce49e9f604c
                - Message: İş kendisine yönlendirildi.
                  ForwardDate: '2026-02-04T13:54:28.7929678'
                  FromUserId: 97aa0081-8ca5-4acb-b757-15efd1bba944
                  ToUserId: ae116cd4-a26e-47ab-8b0f-07d5ac9cb79c
                  AssignerUserId: ae116cd4-a26e-47ab-8b0f-07d5ac9cb79c
        '400':
          description: Bad Request
          headers:
            Content-Type:
              schema:
                type: string
                example: application/json
          content:
            application/json:
              schema:
                type: object
              example:
                Status: false
                Code: Validation.General
                Message: One or more validation errors occurred
                Response:
                  - Field: JobId
                    Message: JobId must be greater than zero.
        '404':
          description: Not Found
          headers:
            Content-Type:
              schema:
                type: string
                example: application/json
          content:
            application/json:
              schema:
                type: object
              example:
                Status: false
                Code: OfflineJobs.JobNotFound
                Message: No job found for the requested JobId.
                Response: null
